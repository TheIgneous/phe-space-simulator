name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate snapshot from committed timetables + plan (if present)
        run: |
          if [ -f "data/primary-timetable.xml" ] && [ -f "data/secondary-timetable.xml" ]; then
            ALLOC=""
            if [ -f "data/allocations.csv" ]; then ALLOC="--allocations data/allocations.csv"; fi
            npm run ingest -- --primary "data/primary-timetable.xml" --secondary "data/secondary-timetable.xml" $ALLOC
          else
            echo "No data/*.xml committed — building from the existing snapshot.json."
          fi

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
